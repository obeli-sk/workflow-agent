# --- System prompt + tool schemas ---------------------------------------------
# Returns the agent's system prompt and the OpenAI tool schemas (built from one
# source of truth). The agent has no exec activities: it talks to an LLM endpoint
# over HTTP via llm_chat below.

[[activity_js]]
name = "agent_system_prompt"
ffqn = "obelisk-agent:agent/prompt.load-system-prompt"
params = []
return_type = "result<record { prompt: string, tools-json: string }, string>"
location = "activity/agent-system-prompt.js"
content_digest = "sha256:1e048e73f01fb06d026ac6ec5ffcde0a271857830af2513f0d1357513d77af3f"
[[activity_js.allowed_host]]
pattern = "https://obeli.sk"
methods = ["GET"]
request_url_regex = "^GET https://obeli\\.sk/docs/latest/llms.txt/"

# --- LLM endpoint: HTTP Chat Completions client -------------------------------
# The only way the agent talks to a model. Point LLM_BASE_URL at the
# agent-backed-llm-server (claude/codex in docker) or any OpenAI-compatible
# provider (OpenRouter, OpenAI, vLLM, ...); set LLM_BASE_URL_REGEX to match.

[[activity_js]]
name = "llm_chat"
ffqn = "obelisk-agent:llm/chat.completion"
params = [
  { name = "messages-json", type = "string" },
  { name = "tools-json",    type = "string" },
  { name = "model",         type = "string" },
]
return_type = "result<variant { reply(record { content: string, tool-calls: list<record { id: string, name: string, arguments-json: string }>, finish-reason: string }), rate-limited(record { retry-after-seconds: u32, message: string }) }, string>"
location = "activity/llm-chat.js"
exec.lock_expiry.minutes = 10
max_retries = 3
env_vars = [
  { key = "LLM_BASE_URL", value = "${LLM_BASE_URL:-http://127.0.0.1:9190}" },
  { key = "LLM_MODEL",    value = "${LLM_MODEL:-claude}" },
  { key = "LLM_API_KEY",  value = "${LLM_API_KEY:-}" },
]
content_digest = "sha256:b722a4351c04a1e13a183203b7eb6b6fa3efe9b5777726eb452c7ba572c7e424"
[[activity_js.allowed_host]]
pattern = "${LLM_BASE_URL:-http://127.0.0.1:9190}"
methods = ["POST"]
request_url_regex = "^POST ${LLM_BASE_URL_REGEX:-http://127\\.0\\.0\\.1:9190}/v1/chat/completions$"

# `request_url_regex` is matched against `METHOD URL` (query stripped). It uses
# OBELISK_API_URL_REGEX (a regex-escaped form of OBELISK_API_URL); set both when
# pointing at a non-default host.

