# --- GitHub export ----------------------------------------------
# Activities for pushing the live deployment manifest + owned sources into a
# GitHub repo. Each is invoked by workflow.push-deployment; the commit chain is
# driven from the workflow (one file per commit) so each step is durable and
# replayable. Secret WORKFLOW_AGENT_GITHUB_TOKEN is exposed as an outbound HTTP
# secret and replaced only in approved GitHub request headers.

[[activity_js]]
name = "github_create_branch"
ffqn = "agent-herder:github/repo.create-branch"
params = [
  { name = "owner",       type = "string" },
  { name = "repo",        type = "string" },
  { name = "base-branch", type = "string" },
  { name = "new-branch",  type = "string" },
]
return_type = "result<string, string>"
location = "packs/obelisk-control/github/create-branch.js"
exec.lock_expiry.seconds = 30
content_digest = "sha256:1115c913ae61730b9de1e3cdafabd59c119980e35f85ad7cc26adeee37bc7eb0"
[[activity_js.allowed_host]]
pattern = "https://api.github.com"
methods = ["GET", "POST"]
request_url_regex = "^(POST https://api\\.github\\.com/repos/[^/]+/[^/]+/git/refs|GET https://api\\.github\\.com/repos/[^/]+/[^/]+/git/ref/heads/[^/]+)$"
[activity_js.allowed_host.secrets]
env_vars = [{ key = "WORKFLOW_AGENT_GITHUB_TOKEN", value = "${WORKFLOW_AGENT_GITHUB_TOKEN:-}" }]
replace_in = ["headers"]


