# --- Deployment editing: checkout -> edit one component -> submit -------------
# The workflow holds the checked-out deployment.toml in memory, split into
# per-component blocks, and edits one component at a time (see
# workflow/agent-loop.js). These activities are the durable I/O boundary: fetch
# the manifest, read owned file blobs from the CAS, and submit the manifest as a
# new inactive deployment (digests filled, CAS-efficient preflight + multipart
# retry). A hot redeploy goes through tool_apply_deployment.

