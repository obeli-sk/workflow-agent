# --- Pack descriptor: system prompt + tool catalog ----------------------------
# The obelisk-control use case (control this Obelisk instance). Returns the
# system prompt and the tool catalog (name, description, ffqn, WIT param specs).
# The generic core (workflow.agent-loop) calls this once, exposes the tools to
# the model, and dispatches each call to its ffqn via obelisk.call. Swap this
# FFQN (workflow.run descriptor-ffqn) to host a different use case.

[[activity_js]]
name = "pack_describe"
ffqn = "obelisk-control:agent/pack.describe"
params = []
return_type = "result<record { prompt: string, tools-json: string }, string>"
location = "packs/obelisk-control/descriptor.js"
content_digest = "sha256:169c54cb06b3558db9ce2cd1d71c58133d0fd93d71a05285d3a965f42c7a07b5"
[[activity_js.allowed_host]]
pattern = "https://obeli.sk"
methods = ["GET"]
request_url_regex = "^GET https://obeli\\.sk/docs/latest/llms.txt/"

# Native call: run any deployed Obelisk function chosen at runtime by the model
# (obelisk-control pack). A workflow, so obelisk.call runs durably in-loop.
[[workflow_js]]
ffqn = "obelisk-control:tools/native.call"
params = [
  { name = "ffqn",        type = "string" },
  { name = "params-json", type = "string" },
]
return_type = "result<string, string>"
location = "packs/obelisk-control/native-call.js"
content_digest = "sha256:b77c66904303c4437a859c7facdc8e4c2e948f54cb5aaae8f953596b66c955a8"

# --- LLM endpoint: multi-provider client --------------------------------------
# The only way the agent talks to a model. It speaks a provider-neutral message
# model and routes each request to the correct wire API (anthropic-messages,
# openai-chat-completions, openai-responses) based on the AGENT_MODELS catalog.
#
# AGENT_MODELS is a JSON array of models: each entry has
#   { id, label, api_type, base_url, wire_model, key_env?, max_tokens? }
# It is REQUIRED (no built-in default): set it in the environment before serving
# (see .envrc-example / models.*.json). Each model's endpoint must have a matching
# allowed_host below; keyed providers also need the matching secret.

[[activity_js]]
name = "llm_chat"
ffqn = "obelisk-agent:llm/chat.completion"
params = [
  { name = "system",        type = "string" },
  { name = "messages-json", type = "string" },
  { name = "tools-json",    type = "string" },
  { name = "model",         type = "string" },
  { name = "effort",        type = "string" },
]
return_type = "result<variant { reply(record { content-json: string, stop-reason: string }), rate-limited(record { retry-after-seconds: u32, message: string }) }, string>"
location = "activity/llm-chat.js"
exec.lock_expiry.minutes = 10
max_retries = 3
env_vars = [
  "AGENT_MODELS",
]
content_digest = "sha256:8b9c244f99955b5bd45ee37205fd89ec33599976c94a1f1fb474bee6b8a40790"

# Local agent-backed-llm-server (Claude/Codex subscription in docker;
# OpenAI-compatible, no key). Whitelisted here; point AGENT_MODELS at it to use it
# (models.local.json).
[[activity_js.allowed_host]]
pattern = "${LLM_BASE_URL:-http://127.0.0.1:9190}"
methods = ["POST"]
request_url_regex = "^POST ${LLM_BASE_URL_REGEX:-http://127\\.0\\.0\\.1:9190}/v1/(chat/completions|responses)$"

# exe.dev LLM gateway. One local origin proxies Anthropic / OpenAI / Fireworks;
# real credentials are injected at the gateway edge, so a model here sends only the
# literal public token "implicit" (auth_value in AGENT_MODELS) -- no secret. Switch
# to it by setting AGENT_MODELS in .envrc (see .envrc-example / models.exe-gateway.json).
[[activity_js.allowed_host]]
pattern = "${LLM_GATEWAY:-http://localhost:7070}"
methods = ["POST"]
request_url_regex = "^POST ${LLM_GATEWAY_REGEX:-http://localhost:7070}/gateway/llm/(anthropic/v1/messages|openai/v1/(chat/completions|responses)|fireworks/inference/v1/chat/completions)$"

# OpenRouter (keyed provider reached directly; models.openrouter.json). Each
# catalog entry sends auth_value = "Bearer ${OPENROUTER_API_KEY}"; the runtime
# swaps the placeholder for the real key in the outbound header, so the JS never
# sees it. Set OPENROUTER_API_KEY in the environment to route here.
[[activity_js.allowed_host]]
pattern = "https://openrouter.ai"
methods = ["POST"]
request_url_regex = "^POST https://openrouter\\.ai/api/v1/(chat/completions|responses)$"
[activity_js.allowed_host.secrets]
env_vars = [{ key = "OPENROUTER_API_KEY", value = "${OPENROUTER_API_KEY:-}" }]
replace_in = ["headers"]

# `request_url_regex` is matched against `METHOD URL` (query stripped). It uses
# OBELISK_API_URL_REGEX (a regex-escaped form of OBELISK_API_URL); set both when
# pointing at a non-default host.

