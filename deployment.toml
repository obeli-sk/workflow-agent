# --- agent-herder GitHub export ----------------------------------------------
# Activities for pushing the live deployment manifest + owned sources into a
# GitHub repo. Each is invoked by workflow.push-deployment; the commit chain is
# driven from the workflow (one file per commit) so each step is durable and
# replayable. Secret AGENT_HERDER_GITHUB_TOKEN is exposed as an outbound HTTP
# secret and replaced only in approved GitHub request headers.

[[activity_js]]
name = "github_create_branch"
ffqn = "agent-herder:github/repo.create-branch"
params = [
  { name = "owner",       type = "string" },
  { name = "repo",        type = "string" },
  { name = "base-branch", type = "string" },
  { name = "new-branch",  type = "string" },
]
return_type = "result<string, string>"
location = "activity/github/create-branch.js"
exec.lock_expiry.seconds = 30
content_digest = "sha256:0f1d3a58f43403ea7be5a1973b6392f71bfe702ca1fe388abaa3020fb852259e"
[[activity_js.allowed_host]]
pattern = "https://api.github.com"
methods = ["GET", "POST"]
request_url_regex = "^(POST https://api\\.github\\.com/repos/[^/]+/[^/]+/git/refs|GET https://api\\.github\\.com/repos/[^/]+/[^/]+/git/ref/heads/[^/]+)$"
[activity_js.allowed_host.secrets]
env_vars = ["AGENT_HERDER_GITHUB_TOKEN"]
replace_in = ["headers"]


[[activity_js]]
name = "github_push_file"
ffqn = "agent-herder:github/repo.push-file"
params = [
  { name = "owner",             type = "string" },
  { name = "repo",              type = "string" },
  { name = "branch",            type = "string" },
  { name = "expected-head-oid", type = "string" },
  { name = "path",              type = "string" },
  { name = "content",           type = "string" },
  { name = "headline",          type = "string" },
  { name = "body",              type = "string" },
]
return_type = "result<string, string>"
location = "activity/github/push-file.js"
exec.lock_expiry.seconds = 60
max_retries = 0
content_digest = "sha256:95d7ef54ab311a714a90cf25b4c21cdc1c58732ce950e0a3b6a52d8f6772f04f"
[[activity_js.allowed_host]]
pattern = "https://api.github.com"
methods = ["POST"]
request_url_regex = "^POST https://api\\.github\\.com/graphql$"
[activity_js.allowed_host.secrets]
env_vars = ["AGENT_HERDER_GITHUB_TOKEN"]
replace_in = ["headers"]


[[activity_js]]
name = "github_create_pr"
ffqn = "agent-herder:github/repo.create-pr"
params = [
  { name = "owner",        type = "string" },
  { name = "repo",         type = "string" },
  { name = "head-branch",  type = "string" },
  { name = "base-branch",  type = "string" },
  { name = "title",        type = "string" },
  { name = "body",         type = "string" },
]
return_type = "result<string, string>"
location = "activity/github/create-pr.js"
exec.lock_expiry.seconds = 60
content_digest = "sha256:a3bedb61c769df816b3c1188f18321bca6535125b13b8a1f85356b906fe12a1b"
[[activity_js.allowed_host]]
pattern = "https://api.github.com"
methods = ["GET", "POST"]
request_url_regex = "^(GET|POST) https://api\\.github\\.com/repos/[^/]+/[^/]+/pulls$"
[activity_js.allowed_host.secrets]
env_vars = ["AGENT_HERDER_GITHUB_TOKEN"]
replace_in = ["headers"]

# --- agent-herder GitHub export: orchestrator workflow ------------------------
# Pulls the live deployment's manifest + every owned source via the existing
# webapi.* activities, then drives the GitHub activities to create a branch,
# commit each file (chaining the head OID), and open a PR. Each per-file commit
# is its own activity invocation so the chain is durable and replayable.

[[workflow_js]]
ffqn = "agent-herder:export/workflow.push-deployment"
params = [
  { name = "branch-name", type = "string" },
  { name = "pr-title",    type = "string" },
  { name = "pr-body",     type = "string" },
]
return_type = "result<string, string>"
location = "workflow/push-deployment.js"
content_digest = "sha256:1811dc43ffe08a2f5f473e3c1a16d6c0554bfbc3d3c8d34f83936461037daa91"

