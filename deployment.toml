# --- Deployment editing: checkout -> edit files -> push -----------------------
# The workflow holds the checked-out canonical config in memory and exposes its
# source bodies as editable files (see workflow/agent-loop.js). These activities
# are the durable I/O boundary: fetch the deployment, submit the reassembled
# config, and enqueue it. A hot redeploy goes through tool_apply_deployment.

[[activity_js]]
name = "tool_deployment_checkout"
ffqn = "obelisk-agent:tools/webapi.deployment-checkout"
params = [
  { name = "deployment-id", type = "option<string>" },
]
return_type = "result<string, string>"
location = "${DEPLOYMENT_DIR}/activity/tools/deployment-checkout.js"
[[activity_js.allowed_host]]
pattern = "${OBELISK_API_URL:-http://127.0.0.1:5005}"
methods = ["GET"]

[[activity_js]]
name = "tool_deployment_submit"
ffqn = "obelisk-agent:tools/webapi.deployment-submit"
params = [
  { name = "config-json",   type = "string" },
  { name = "description",    type = "string" },
  { name = "verify",        type = "bool" },
  { name = "deployment-id",  type = "string" },
]
return_type = "result<string, string>"
location = "${DEPLOYMENT_DIR}/activity/tools/deployment-submit.js"
[[activity_js.allowed_host]]
pattern = "${OBELISK_API_URL:-http://127.0.0.1:5005}"
methods = ["POST"]

[[activity_js]]
name = "tool_deployment_switch"
ffqn = "obelisk-agent:tools/webapi.deployment-switch"
params = [
  { name = "deployment-id", type = "string" },
  { name = "verify",       type = "bool" },
]
return_type = "result<string, string>"
location = "${DEPLOYMENT_DIR}/activity/tools/deployment-switch.js"
[[activity_js.allowed_host]]
pattern = "${OBELISK_API_URL:-http://127.0.0.1:5005}"
methods = ["PUT"]

[[activity_exec]]
name = "tool_apply_deployment"
ffqn = "obelisk-agent:tools/webapi.apply-deployment"
params = [
  { name = "deployment-id", type = "string" },
]
return_type = "result<string, string>"
location = "${DEPLOYMENT_DIR}/activity/tools/apply-deployment.js"
exec.lock_expiry.seconds = 30
max_retries = 1
env_vars = [
  "PATH",
  { key = "OBELISK_API_URL", value = "${OBELISK_API_URL:-http://127.0.0.1:5005}" },
]

# --- Stub activity: human-in-the-loop -----------------------------------------

[[activity_stub]]
name = "tool_ask_user"
ffqn = "obelisk-agent:tools/input.ask-user"
params = [
  { name = "question", type = "string" },
]
return_type = "result<string, string>"

# confirm-apply: the human gate before a hot reload goes live. The workflow
# parks on this stub when the agent calls obelisk.deployment_push with
# mode="apply"; the web UI surfaces it as an OK/Cancel card (with a source diff
# vs the active deployment). ok => approved (apply proceeds), err => cancelled.
[[activity_stub]]
name = "tool_confirm_apply"
ffqn = "obelisk-agent:tools/deploy.confirm-apply"
params = [
  { name = "deployment-id", type = "string" },
  { name = "summary",       type = "string" },
]
return_type = "result<_, string>"

# Long-lived supervisor control child. The web UI cancels this stub to request
# teardown; the root workflow races it against the complete agent-loop workflow.
[[activity_stub]]
name = "session_teardown_signal"
ffqn = "obelisk-agent:agent/session.teardown-signal"
params = []
return_type = "result<_, string>"

# One generic operator-message offer owned by workflow.agent-loop. The UI may
# fulfil it only while this concrete stub execution is pending. The workflow
# includes it in the next session.send call and immediately opens another offer.
[[activity_stub]]
name = "session_injection"
ffqn = "obelisk-agent:agent/session.injection"
params = []
return_type = "result<string, string>"

# --- Workflow -----------------------------------------------------------------

[[workflow_js]]
ffqn = "obelisk-agent:workflow/workflow.agent-loop"
params = [
  { name = "prompt",       type = "string" },
  { name = "socket-path",  type = "string" },
]
return_type = "result<string, string>"
location = "${DEPLOYMENT_DIR}/workflow/agent-loop.js"

# Public supervisor workflow. It owns the container lifecycle and races the
# nested agent-loop workflow against the operator teardown signal.
[[workflow_js]]
ffqn = "obelisk-agent:workflow/workflow.run"
params = [
  { name = "prompt", type = "string" },
  # Which agent backend to drive: "claude" (default) or "codex". null => claude.
  { name = "backend", type = "option<string>" },
]
return_type = "result<string, string>"
location = "${DEPLOYMENT_DIR}/workflow/agent.js"

[[webhook_endpoint_js]]
name = "ui"
location = "${DEPLOYMENT_DIR}/webhook/ui.js"
routes = [
  { methods = ["GET"], route = "/" },
  { methods = ["GET"], route = "/api/runs" },
  { methods = ["GET"], route = "/api/runs/:execution-id" },
  { methods = ["GET"], route = "/api/logs/:execution-id" },
  { methods = ["POST"], route = "/api/submit" },
  { methods = ["POST"], route = "/api/answer/:child-id" },
  { methods = ["POST"], route = "/api/confirm/:child-id" },
  { methods = ["POST"], route = "/api/pause/:execution-id" },
  { methods = ["POST"], route = "/api/unpause/:execution-id" },
  { methods = ["POST"], route = "/api/say/:execution-id" },
  { methods = ["POST"], route = "/api/cleanup/:execution-id" },
  { methods = ["POST"], route = "/api/fork/:execution-id" },
]
env_vars = [
  { key = "OBELISK_API_URL", value = "${OBELISK_API_URL:-http://127.0.0.1:5005}" },
  { key = "OBELISK_UI_URL",  value = "${OBELISK_UI_URL:-http://localhost:8080}" },
]
[[webhook_endpoint_js.allowed_host]]
pattern = "${OBELISK_API_URL:-http://127.0.0.1:5005}"
methods = ["GET", "PUT"]
