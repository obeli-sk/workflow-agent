[[activity_js.allowed_host]]
pattern = "https://api.github.com"
methods = ["GET", "POST"]
request_url_regex = "^(GET|POST) https://api\\.github\\.com/repos/[^/]+/[^/]+/pulls$"
[activity_js.allowed_host.secrets]
env_vars = ["AGENT_HERDER_GITHUB_TOKEN"]
replace_in = ["headers"]

# --- agent-herder GitHub export: orchestrator workflow ------------------------
# Pulls the live deployment's manifest + every owned source via the existing
# webapi.* activities, then drives the GitHub activities to create a branch,
# commit each file (chaining the head OID), and open a PR. Each per-file commit
# is its own activity invocation so the chain is durable and replayable.

[[workflow_js]]
ffqn = "agent-herder:export/workflow.push-deployment"
params = [
  { name = "branch-name", type = "string" },
  { name = "pr-title",    type = "string" },
  { name = "pr-body",     type = "string" },
]
return_type = "result<string, string>"
location = "workflow/push-deployment.js"
content_digest = "sha256:1811dc43ffe08a2f5f473e3c1a16d6c0554bfbc3d3c8d34f83936461037daa91"

