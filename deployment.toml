# confirm-apply: the human gate before a hot reload goes live. The workflow
# parks on this stub when the agent calls obelisk.deployment_push with
# mode="apply"; the web UI surfaces it as an OK/Cancel card (with a source diff
# vs the active deployment). ok => approved (apply proceeds), err => cancelled.
[[activity_stub]]
name = "tool_confirm_apply"
ffqn = "obelisk-agent:tools/deploy.confirm-apply"
params = [
  { name = "deployment-id", type = "string" },
  { name = "summary",       type = "string" },
]
return_type = "result<_, string>"

# Long-lived supervisor control child. The web UI cancels this stub to request
